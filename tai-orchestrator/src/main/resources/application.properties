#### Spring ####
spring.application.name=tai-orchestrator
spring.main.allow-circular-references=true

#### Mock ####
tai.mock.llm.delay-ms=4000
tai.mock.tts.playback-delay-ms=6000
tai.mock.tts.voice-id=slow-mock-voice

#### Ollama ####
tai.ollama.base-url=http://localhost:11434
tai.ollama.chat-path=/api/chat
tai.ollama.model=tai-llama-0.0.1
tai.ollama.stream=false
tai.ollama.keep-alive=30m
tai.ollama.connect-timeout-ms=3000
tai.ollama.read-timeout-ms=120000

#### Prompts ####
tai.prompt.system-file=classpath:prompts/tai-system-prompt.txt

### Logs ####
logging.config=classpath:logback-spring.xml
tai.logging.conversation-trace-enabled=true
tai.logging.log-llm-context=true
tai.logging.log-llm-context-full=false
