spring:
    application:
        name: tai-orchestrator
    main:
        allow-circular-references: true
logging:
    level:
        root: INFO
        org:
            springframework: WARN
            hibernate: WARN
        # Global Tai domains
        tai:
            error: WARN
            conversation: DEBUG #INFO for less detailed history
            context: DEBUG
            decision: INFO
            performance: INFO
            trace: TRACE
tai:
    prompt:
        system-file: classpath:prompts/tai-system-prompt.txt
    logs:
        dir: ./tai-orchestrator/logs # for logback-spring.xml
    llm:
        base-url: http://localhost:8092
    tts:
        base-url: http://localhost:8093
    system-health:
        services:
            orchestrator:
                url: http://localhost:8080/actuator/health
            stt-listener:
                url: http://localhost:8094/actuator/health
            stt-whisper:
                url: http://localhost:8095/health
            llm:
                url: http://localhost:8092/actuator/health
            tts-piper:
                url: http://localhost:8093/actuator/health
        connect-timeout-ms: 1000
        read-timeout-ms: 2000
management:
    endpoints:
        web:
            exposure:
                include: health
    endpoint:
        health:
            show-details: always

springdoc:
    swagger-ui:
        path: /docs
    api-docs:
        path: /v3/api-docs
