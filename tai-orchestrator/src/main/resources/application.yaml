spring:
    application:
        name: tai-orchestrator
    main:
        allow-circular-references: true
logging:
    level:
        root: INFO
        org:
            springframework: WARN
            hibernate: WARN
        # Global Tai domains
        tai:
            error: WARN
            conversation: INFO #INFO for less detailed history
            context: DEBUG
            decision: INFO
            performance: INFO
            trace: TRACE
tai:
    prompt:
        system-file: classpath:prompts/tai-system-prompt.txt
    logs:
        dir: ./tai-orchestrator/logs # for logback-spring.xml
    llm:
        base-url: http://localhost:8092
    tts:
        base-url: http://localhost:8093
    system-health:
        services:
            orchestrator:
                url: http://localhost:8080/actuator/health
            stt-listener:
                url: http://localhost:8094/actuator/health
            stt-whisper:
                url: http://localhost:8095/health
            llm:
                url: http://localhost:8092/actuator/health
            tts-piper:
                url: http://localhost:8093/actuator/health
        connect-timeout-ms: 1000
        read-timeout-ms: 2000
    ui:
        health-refresh:
            enabled: true
            interval: 5s
            freshness-threshold: 15s
            request-timeout: 2s
            error-refresh-min-delay: 3s
            min-delay-between-attempts: 1s
            ui-push-debounce: 75ms
            endpoints:
              orchestrator: http://localhost:8080/actuator/health
              stt-listener: http://localhost:8094/actuator/health
              stt-whisper: http://localhost:8095/health
              llm: http://localhost:8092/actuator/health
              tts-piper: http://localhost:8093/actuator/health
        state-refresh:
            enabled: true
        manual-input:
            max-length: 2000
        sse:
            timeout: 1h
            reconnect-delay: 2s
management:
    endpoints:
        web:
            exposure:
                include: health
    endpoint:
        health:
            show-details: always

springdoc:
    swagger-ui:
        path: /docs
    api-docs:
        path: /v3/api-docs
